changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: Features
      labels: [feature, enhancement]
    - title: Bug Fixes
      labels: [bug, fix]
    - title: UI & Design
      labels: [ui, design]
    - title: Maintenance
      labels: [chore, refactor, dependencies]
    - title: Other Changes
      labels: ['*']
